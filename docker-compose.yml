version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: 
      context: .
      dockerfile: app/Dockerfile
    restart: always
    volumes:
      - video_data:/data
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8000"
  
  worker:
    build:
      context: .
      dockerfile: app/Dockerfile
    command: python worker.py
    restart: always
    volumes:
      - video_data:/data
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web

volumes:
  video_data: